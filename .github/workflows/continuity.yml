name: continuity-guardrails

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  continuity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Determine diff base/head
        id: shas
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "base=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
            echo "head=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "base=$(git rev-parse HEAD~1)" >> "$GITHUB_OUTPUT"
            echo "head=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Continuity check (PROGRESS/AUDIT/SCRATCHPAD)
        env:
          CONTINUITY_BASE_SHA: ${{ steps.shas.outputs.base }}
          CONTINUITY_HEAD_SHA: ${{ steps.shas.outputs.head }}
        run: node scripts/check-continuity.mjs

